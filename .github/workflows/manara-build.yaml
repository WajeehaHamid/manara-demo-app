name: manara-build

on:
  push:
    branches: [main]

permissions:
  contents: write
  packages: write

jobs:
  build:
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: vars
        run: |
          echo "image=ghcr.io/$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')/manara-demo-app" >> "$GITHUB_OUTPUT"
          echo "sha_short=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.vars.outputs.image }}:${{ steps.vars.outputs.sha_short }}
            ${{ steps.vars.outputs.image }}:latest
      - name: Pin image tag
        run: |
          set -e
          new_image="${{ steps.vars.outputs.image }}:${{ steps.vars.outputs.sha_short }}"
          sed -i "s|image: ghcr.io/.*/manara-demo-app:.*|image: ${new_image}|" k8s/service.yaml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet -- k8s/service.yaml; then
            git add k8s/service.yaml
            git commit -m "deploy: pin image to ${{ steps.vars.outputs.sha_short }} [skip ci]"
            git push
          fi
